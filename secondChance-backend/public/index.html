<!DOCTYPE html>
<html>
<head>
  <title>SecondChance Marketplace</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2f4154;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 30px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h2>SecondChance Marketplace</h2>
  <div class="nav-links">
    <a href="/register.html">Register</a>
    <a href="/login.html">Login</a>
  </div>
</header>

<div class="container">
  <div id="itemsContainer" class="items">
    Loading items...
  </div>
</div>

<script>
async function loadItems() {
  try {
    const response = await fetch("/api/items");
    const items = await response.json();

    const container = document.getElementById("itemsContainer");
    container.innerHTML = "";

    if (items.length === 0) {
      container.innerHTML = "<p>No items available.</p>";
      return;
    }

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.description}</p>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    document.getElementById("itemsContainer").innerHTML = "Error loading items";
  }
}

loadItems();
</script>

</body>
</html>
