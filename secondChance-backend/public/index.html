<!DOCTYPE html>
<html>
<head>
  <title>SecondChance Marketplace</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
    }

    header {
      background-color: #2f3e4e;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-top: 0;
    }

    .empty {
      text-align: center;
      color: #777;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <div><strong>SecondChance Marketplace</strong></div>
  <div>
    <a href="/register.html">Register</a>
    <a href="/login.html">Login</a>
  </div>
</header>

<div class="container">
  <div id="itemsContainer" class="items"></div>
</div>

<script>
async function loadItems() {
  try {
    const response = await fetch("/api/items");
    const items = await response.json();

    const container = document.getElementById("itemsContainer");

    if (!items || items.length === 0) {
      container.innerHTML = "<div class='empty'>No items available.</div>";
      return;
    }

    container.innerHTML = "";

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.description}</p>
      `;
      container.appendChild(card);
    });

  } catch (error) {
    document.getElementById("itemsContainer").innerHTML =
      "<div class='empty'>Failed to load items.</div>";
  }
}

loadItems();
</script>

</body>
</html>
