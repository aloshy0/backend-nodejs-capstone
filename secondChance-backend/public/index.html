<!DOCTYPE html>
<html>
<head>
  <title>SecondChance Marketplace</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2f4154;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 30px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 70%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .search-box button {
      padding: 10px 15px;
      background: #2f4154;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #1f2d3a;
    }
  </style>
</head>
<body>

<header>
  <h2>SecondChance Marketplace</h2>
  <div class="nav-links">
    <a href="/register.html">Register</a>
    <a href="/login.html">Login</a>
  </div>
</header>

<div class="container">

  <!-- SEARCH BAR -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search items...">
    <button onclick="searchItems()">Search</button>
  </div>

  <!-- ITEMS -->
  <div id="itemsContainer" class="items">
    Loading items...
  </div>

</div>

<script>

let allItems = [];

async function loadItems() {
  const response = await fetch("/api/items");
  allItems = await response.json();
  renderItems(allItems);
}

function searchItems() {
  const query = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allItems.filter(item =>
    item.title.toLowerCase().includes(query)
  );

  renderItems(filtered);
}

function renderItems(items) {
  const container = document.getElementById("itemsContainer");
  container.innerHTML = "";

  if (items.length === 0) {
    container.innerHTML = "<p>No matching items found.</p>";
    return;
  }

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>
        <a href="/item.html?id=${item._id}" style="text-decoration:none;color:#2f4154;">
          ${item.title}
        </a>
      </h3>
      <p>${item.description}</p>
    `;

    container.appendChild(card);
  });
}

loadItems();

</script>

</body>
</html>
